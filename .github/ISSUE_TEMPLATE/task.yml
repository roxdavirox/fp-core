name: Task
description: Refactor, test, docs, CI, or other internal work.
labels: [task]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
    validations:
      required: true
